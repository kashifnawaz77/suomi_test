    <style>
        body {
            font-family: Arial, sans-serif;

            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            max-width: 900px;
            width: 100%;
        }

        .question-card {
            /* Sininen liukuväritausta kuten kuvassa */
            background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%);
            padding: 40px;
            margin-bottom: 30px;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            min-height: 400px;
        }

        .q-header {
            font-size: 18px;
            font-weight: bold;
            color: #003366;
            margin-bottom: 40px;
            border-bottom: 1px solid rgba(0,51,102,0.2);
            padding-bottom: 10px;
        }

        .option-container {
            display: flex;
            align-items: flex-start;
            margin-bottom: 25px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .option-container:hover {
            transform: translateX(5px);
        }

        /* Vastausruutu tekstin vasemmalla puolella */
        .checkbox {
            width: 30px;
            height: 30px;
            border: 2px solid #003366;
            background-color: white;
            margin-right: 20px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .option-text {
            font-size: 16px;
            color: #003366;
            line-height: 1.4;
            padding-top: 4px;
        }

        /* Tilat vastauksen jälkeen */
        .answered .option-container {
            pointer-events: none;
        }

        .correct .checkbox {
            background-color: #28a745 !important;
            border-color: #28a745 !important;
            color: white;
        }
        .correct .checkbox::after { content: "✓"; }

        .wrong .checkbox {
            background-color: #dc3545 !important;
            border-color: #dc3545 !important;
            color: white;
        }
        .wrong .checkbox::after { content: "✕"; }

        .correct-answer .checkbox {
            border: 3px solid #28a745;
            background-color: #d4edda;
        }

        h1 { color: white; text-align: center; margin-bottom: 40px; }

</head>

    function buildQuiz() {
        const root = document.getElementById('quiz-container');
        
        quizData.forEach((data, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            // Otsikko (kysymysnumero ja teksti)
            const header = document.createElement('div');
            header.className = 'q-header';
            header.innerText = `${index + 1} / ${quizData.length}   ${data.q}`;
            card.appendChild(header);

            // Vastaukset
            data.options.forEach((optText, optIndex) => {
                const container = document.createElement('div');
                container.className = 'option-container';
                
                const checkbox = document.createElement('div');
                checkbox.className = 'checkbox';
                
                const text = document.createElement('div');
                text.className = 'option-text';
                text.innerText = optText;

                container.appendChild(checkbox);
                container.appendChild(text);

                container.onclick = () => {
                    if(card.classList.contains('answered')) return;
                    card.classList.add('answered');

                    if(optIndex === data.correct) {
                        container.classList.add('correct');
                    } else {
                        container.classList.add('wrong');
                        // Näytä oikea vastaus
                        card.querySelectorAll('.option-container')[data.correct].classList.add('correct-answer');
                    }
                };

                card.appendChild(container);
            });

            root.appendChild(card);
        });
    }

    buildQuiz();
